<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Controle Financeiro</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <meta name="description" content="Controle seus gastos e receitas de forma simples.">

  <meta property="og:title" content="$ Meu Controle Financeiro">
  <meta property="og:description" content="Acompanhe receitas e despesas facilmente.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://fabiosimedo.github.io/expense-tracker/">
  <meta property="og:image" content="https://fabiosimedo.github.io/expense-tracker/preview.png">

  <meta property="og:locale" content="pt_BR">
  <meta property="og:site_name" content="Controle Financeiro">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="balance-card">
      <h1 id="balance" class="balance-value">$0.00</h1>
    </div>
    <div class="chart-container">
      <canvas id="expense-chart"></canvas>
    </div>
    <div class="inc-exp-container">
      <div>
        <h4>Entradas</h4>
        <p id="money-plus" class="money plus">+$0.00</p>
      </div>
      <div>
        <h4>Saídas</h4>
        <p id="money-minus" class="money minus">-$0.00</p>
      </div>
    </div>

    <h3>Histórico</h3>
    <ul id="list" class="list">
      <!-- <li class="minus">
          Cash <span>-$400</span><button class="delete-btn">x</button>
        </li> -->
    </ul>

    <h3>Adicione transação</h3>
    <form id="form">
      <div class="form-control">
        <label for="text">Descrição</label>
        <input type="text" id="text" placeholder="Adicione descrição..." />
      </div>

      <div class="form-control">
        <label>Tipo</label>
        <div class="transaction-type" role="radiogroup" aria-label="Transaction type">
          <label class="type-option active" for="type-expense">
            <input type="radio" id="type-expense" name="transaction-type" value="expense" checked />
            <span>Despesa</span>
          </label>
          <label class="type-option" for="type-income">
            <input type="radio" id="type-income" name="transaction-type" value="income" />
            <span>Entrada</span>
          </label>
        </div>
      </div>

      <div class="form-control">
        <label for="amount">Valor</label>
        <input type="number" id="amount" placeholder="Enter amount..." inputmode="decimal" min="0" step="0.01" />
        <small id="amount-help">Adicione suas transações acima</small>
      </div>
      <button class="btn">Adicione transação</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>

</html>
