<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="style.css" />
  <title>Expense Tracker</title>
</head>

<body>
  <div class="container">
    <div class="balance-card">
      <h1 id="balance" class="balance-value">$0.00</h1>
    </div>
    <div class="chart-container">
      <canvas id="expense-chart"></canvas>
    </div>
    <div class="inc-exp-container">
      <div>
        <h4>Entradas</h4>
        <p id="money-plus" class="money plus">+$0.00</p>
      </div>
      <div>
        <h4>Saídas</h4>
        <p id="money-minus" class="money minus">-$0.00</p>
      </div>
    </div>

    <h3>Histórico</h3>
    <ul id="list" class="list">
      <!-- <li class="minus">
          Cash <span>-$400</span><button class="delete-btn">x</button>
        </li> -->
    </ul>

    <h3>Adicione transação</h3>
    <form id="form">
      <div class="form-control">
        <label for="text">Descrição</label>
        <input type="text" id="text" placeholder="Adicione descrição..." />
      </div>

      <div class="form-control">
        <label>Tipo</label>
        <div class="transaction-type" role="radiogroup" aria-label="Transaction type">
          <label class="type-option active" for="type-expense">
            <input type="radio" id="type-expense" name="transaction-type" value="expense" checked />
            <span>Despesa</span>
          </label>
          <label class="type-option" for="type-income">
            <input type="radio" id="type-income" name="transaction-type" value="income" />
            <span>Entrada</span>
          </label>
        </div>
      </div>

      <div class="form-control">
        <label for="amount">Valor</label>
        <input type="number" id="amount" placeholder="Enter amount..." inputmode="decimal" min="0" step="0.01" />
        <small id="amount-help">Adicione suas transações acima</small>
      </div>
      <button class="btn">Adicione transação</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>

</html>
